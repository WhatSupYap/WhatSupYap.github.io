<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>96. CSS 변환이 가진 능력</title>
    <style>
        h1 {
            background-color: #2a9d8f;
            border: 5px solid #264653;
            color: #eae2b7;
            padding: 0.7em;
            width: 300px;
            font-size: 1.8em;
            text-align: center;
            margin:20px auto;
            font-family: 'Courier New', Courier, monospace;
            font-weight: lighter;
        }

        h1:nth-of-type(2n){
            background-color: #e9c46a;
        }
        h1:nth-of-type(3n){
            background-color: #f4a261;
        }
        h1:nth-of-type(4n){
            background-color: #e76f51;
        }

        section:first-of-type h1:nth-of-type(1)
        {
            /* transform-origin: top right; */
            transform: rotate(45deg);
        }
        section:first-of-type h1:nth-of-type(2)
        {
            /* transform-origin: top right; */
            transform: scale(2,1);
        }

        section:first-of-type h1:nth-of-type(3)
        {
            /* transform-origin: top right; */
            transform: translateX(200px);
        }

        section:first-of-type h1:nth-of-type(4)
        {
            /* transform-origin: top right; */
            transform: translate(-200px, 50px);
        }

        section:nth-of-type(2) h1:nth-of-type(1)
        {
            /* transform-origin: top right; */
            transform: skew(30deg);
        }

        section:nth-of-type(2) h1:nth-of-type(2)
        {
            /* transform-origin: top right; */
            transform: skew(10deg, 5deg);
        }

        section:nth-of-type(2) h1:nth-of-type(3)
        {
            /* transform-origin: top right; */
            transform: rotate(20deg) scale(0.5);
        }
    </style>
</head>
<body>
    <section>
        <h1>Transform me!</h1>
        <h1>Transform me!</h1>
        <h1>Transform me!</h1>
        <h1>Transform me!</h1>
    </section>
    <section>
        <h1>Transform me!</h1>
        <h1>Transform me!</h1>
        <h1>Transform me!</h1>
        <h1>Transform me!</h1>
    </section>
</body>
</html>
