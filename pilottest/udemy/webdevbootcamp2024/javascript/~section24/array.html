<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배열 변경</title>
</head>

<body>

    <button class="btnReset">Reset</button>
    <div class="resultBoard" style="width: 300px; height: 300px; background-color: aquamarine;"></div>
    <div class="divButtons">
        <button class="btnPush">Push</button>
        <button class="btnPop">Pop</button>
        <button class="btnShift">Shift</button>
        <button class="btnUnshift">Unshift</button>

    </div>
    <script>
        const resultBoard = document.querySelector(".resultBoard");
        let randomNo = function () { return Math.floor((Math.random() * 10) + 1); }
        let array = function () { let txt = resultBoard.innerText.replace(prefix, "").replace(ggorifix, "").replace(" ", ""); let array = txt.split(','); return array; }
        const prefix = "let array = [";
        const ggorifix = "]";

        function reset() {
            let txt = "let array = [1, 2, 3, 4, 5, 6]";
            resultBoard.innerText = txt;
        }
        function set(array) {
            let txt = "";
            let cnt = 0;
            array.forEach(element => {
                if (element !== "") {
                    if (0 < cnt) txt += `, `;
                    txt += `${element}`;
                    cnt++;
                }
            });
            resultBoard.innerText = prefix + txt + ggorifix;
        }

        document.addEventListener("DOMContentLoaded", () => {

            reset();

            document.querySelector(".btnReset").addEventListener("click", () => {
                reset();
            });

            document.querySelector(".btnPush").addEventListener("click", () => {
                let array_ = array();
                array_.push(randomNo());
                set(array_);xz 
            });

            document.querySelector(".btnPop").addEventListener("click", () => {
                let array_ = array();
                array_.pop();
                set(array_);
            });

            document.querySelector(".btnShift").addEventListener("click", () => {
                let array_ = array();
                array_.shift();
                set(array_);
            });

            document.querySelector(".btnUnshift").addEventListener("click", () => {
                let array_ = array();
                array_.unshift(randomNo());
                set(array_);
            });
        });
    </script>
</body>

</html>
