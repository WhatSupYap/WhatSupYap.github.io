<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코딩연습</title>
    <script src="/pilottest/udemy/webdevbootcamp2024/assets/js/common.js"></script>
    <link href="/pilottest/udemy/webdevbootcamp2024/assets/css/common.css" rel="stylesheet">
    <link href="app.css" rel="stylesheet">
</head>

<body>
    <main>
        <!--
        입력 이벤트 실습
        이제 input 이벤트를 다루는 연습을 할 차례입니다. index.html 파일을 보면 하나의 <h1> 요소와 하나의 <input type="text"> 요소가 있습니다.
            index.html에서 어떤 것도 변경하지 마세요! app.js에서 다음 요구 사항을 충족하는 코드를 작성하세요.

        h1은 "Enter Your Username"이라는 텍스트로 시작해야 합니다(이 작업은 이미 마크업에서 처리되어 있습니다).

        <input> 요소에서 input이벤트가 발생할 때마다 "Welcome, "이라는 문자열 뒤에 현재 텍스트 입력 필드의 값이 오도록 <h1>을 업데이트하세요.
             아래 GIF를 보면서 이 코드가 어떻게 작동해야 하는지 확인하세요.

        <input>이 다시 빈 상태가 되면 <h1>을 업데이트하여 텍스트가 다시 "Enter Your Username"이라고 표시되도록 하세요.
    -->
        <section cp="62">
            <h2>입력 이벤트 실습</h2>
            <article>
                <h1>Enter Your Username</h1>
                <input type="text" id="username">
            </article>
        </section>
        <!--
        이제 양식 및 양식 이벤트 작업을 연습해 볼 시간입니다! index.html에는 이미 두 개의 <input>요소가 포함된 양식 요소가 있습니다.
        두 요소 중 하나는 수량을 위한 것이고 다른 하나는 제품 이름을 위한 것입니다.
        index.html에는 새 <li>를 추가할 빈 <ul>도 포함되어 있습니다.
        코드가 어떻게 작동해야 하는지 대략적으로 살펴보려면 하단의 GIF를 확인하세요.
        여러분이 할 일은 다음 단계를 따르는 것입니다.

        양식 제출 이벤트에 대한 리스너를 설정합니다.

        양식이 제출될 때, 기본 동작을 방지합니다.

        수량 입력 값과 제품 입력 값을 가져옵니다.

        새 <li> 요소를 생성합니다. 새 <li>의 텍스트에 양식에서 입력받은 수량과 제품 이름이 포함되도록 설정합니다.

        페이지의 <ul>에 새 <li>를 추가합니다.

        입력 값을 재설정합니다.

        참고:
        1. 유데미의 인터페이스는 아직 일부 최신 JS 구문(예:.append()을 인식하지 못합니다. 테스트를 통과하려면 이 메서드에 대체 (이전) 구문을 사용해야 합니다.

        2. 테스트를 통과하려면 양식을 form이라는 변수에 할당해야 하며, 이 코드 라인은 이미 app.js 코드에 포함되어 있습니다.
    -->
        <section cp="61">
            <h2>양식 이벤트 연습</h2>
            <article>
                <h1>Grocery List</h1>
                <form action="/nowhere">
                    <label for="item">Enter A Product</label>
                    <input type="text" id="product61" name="product61">
                    <label for="item">Enter A Quantity</label>
                    <input type="number" id="qty61" name="qty61">
                    <button>Submit</button>
                </form>

                <ul id="list61"></ul>
            </article>
        </section>
        <!--
        addEventListener를 사용하는 연습을 해보겠습니다. 각각 'hello'와 'goodbye'라는 id를 갖는 두 개의 버튼을 제공해 드렸습니다. 목표는 각 버튼에 클릭 리스너(click listener)를 추가하는 것입니다.

        hello 버튼을 클릭하면 "hello"라는 문구가 console.log 메서드를 통해 콘솔에 출력되어야 하고

        goodbye 버튼을 클릭하면 "goodbye"라는 문구가 console.log 메서드를 통해 콘솔에 출력되어야 합니다.

        반드시 addEventListener를 사용하세요!
    -->
        <section cp="60">
            <h2>클릭 이벤트 연습 - 인라인 이벤트 처리기</h2>
            <article>
                <h1>Click These Buttons</h1>
                <p>And Prepare To Have Your Mind Blown</p>
                <button id="hello">Hello</button>
                <button id="goodbye">Goodbye</button>
            </article>
        </section>
        <!--
            적을 알라 연습
            이번 연습에서는 여러분에게 인라인 이벤트 처리기를 작성해 보도록 요청하고 있습니다. 이는 제가 권장하는 방법은 아니지만, 이 방법이 여러분을 얼마나 성가시게 하는 것인지 체감하는 기회가 되기를 바랍니다.

            index.html을 보면 하나의 <h1> 요소와 하나의 <button>요소가 있습니다. html에 직접 두 개의 인라인 클릭 처리기를 추가하세요.

            h1을 클릭하면 "boo"가 출력*되어야 합니다.

            button을 클릭하면 "clicked"가 출력되어야 합니다.

            * "출력"= console.log('something here');
        -->
        <section cp="59">
            <h2>적을 알라 연습 - 인라인 이벤트 처리기</h2>
            <article>
                <h1 onclick="alert('boo');">Inline Events Suck...</h1>
                <button id="btn" onclick="alert('clicked');">Click Me</button>
                <br><br>
                <img src="https://img-c.udemycdn.com/redactor/raw/2020-09-27_04-29-57-b51ac5ab00302da842519bb1d8cf2745.gif"
                    style="width: 150px;">
            </article>
        </section>
    </main>
</body>
<foot>
    <script src="cp.js"></script>
</foot>

</html>
