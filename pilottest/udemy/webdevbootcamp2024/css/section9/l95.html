<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 전환 (Transition)</title>
    <style>
        .circle {
            width: 300px;
            height: 300px;
            background-color: black;
            border-radius: 50%;
            transition: 1s;
        }

        .circle:hover {
            background-color: rgb(124, 124, 124);
        }

        .dog {
            width: 300px;
            height: 300px;
            background-image: url(https://flexible.img.hani.co.kr/flexible/normal/960/960/imgdb/resize/2019/0121/00501111_20190121.JPG);
            background-size: cover;
            border: 2px solid palegoldenrod;
            border-radius: 50%;
            transition: 1s;
        }

        .dog:hover {
            width: 300px;
            height: 300px;
            background-image: url(https://image.newsis.com/2023/07/12/NISI20230712_0001313626_web.jpg?rnd=20230712163021);
            background-size: cover;
        }

        section div {
            height: 100px;
            width: 100px;
            background-color: turquoise;
            margin:20px 0;
            transition: width 3s;
        }

        section:hover div {
            width: 110px;
        }

        div:nth-of-type(1){
            transition-timing-function: ease-in;
        }

        div:nth-of-type(2){
            transition-timing-function: ease-out;
        }

        div:nth-of-type(3){
            transition-timing-function: cubic-bezier(0.7, 0, 0.15, 0);
        }

        div:nth-of-type(4){
            transition-timing-function: cubic-bezier(0.85, 0, 0.15, 1);
        }
    </style>
</head>
<body>
    <h1>Transitions, 참고: <a href="https://developer.mozilla.org/en-US/docs/Web/CSS/transition-timing-function">[transition-timing-function]</a> </h1>
    <hr>
    <div class="circle"></div>

    <div class="dog"></div>

    <section>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </section>
</body>
</html>
