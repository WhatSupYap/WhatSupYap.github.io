<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Express로 서버 제작하기</title>
    <link href="/assets/css/doc.css" rel="stylesheet">
</head>
<body>
    <div class="content">
        <h1>Express로 서버제작하기</h1>
        <hr>
        <h2>우리의 첫 번째 Express 앱</h2>
        <ul>
            <li>package.json 생성 > 경로이동 > npm init -y (-y 설정값 묻는 절차 스킵)</li>
            <li>npm i express (구버젼 npm에서 패키지를 package.json에 저잘하려면 --save를 넣어줘야함)</li>
        </ul>
    </div>
</body>
</html>
