<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Express로 서버 제작하기</title>
    <link href="/assets/css/doc.css" rel="stylesheet">

<body>
    <div class="content">
        <h1>34. 템플레이팅으로 동적 HTML 구성하기</h1>
        <hr>
        <h2>템플레이팅이란?</h2>
        <ul>
            <li>(내 생각) Template 템플릿에서 가져와서 템플릿화 한다는 의미로 받아들여짐</li>
            <li>동적 html을 만들기 위한 도구: <a href="https://ejs.co/">EJS</a>(Embedded Javascript)</li>
            <li>Handlebars, Jade, Pug, Nunjucks등이 있다</li>
        </ul>
        <h2>EJS용 Express 구성하기</h2>
        <ul>
            <li>
                서버 구성
            </li>
            <blockquote>
                npm init -y<br>
                npm i express
            </blockquote>
            <li>index.js에 파일작성</li>
        </ul>
    </div>
