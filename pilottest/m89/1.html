<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>89_1</title>
    <style>
        html {
            font-family: sans-serif;
        }

        canvas {
            background: #fff;
            border: 1px dashed;
        }

        a {
            display: inline-block;
            background: #69c;
            color: #fff;
            padding: 5px 10px;
        }
    </style>
</head>

<body>
    <p>
        <a href="https://developer.mozilla.org/ko/docs/Web/HTML/Element/a" target="_blank">[해당 페이지를 참고로 만들어짐]</a>
    </p>

    <p>
        마우스 드래그로 그림을 그려보세요.
        <a id="adown" href="" download="my_painting.png">다운로드</a>
    </p>

    <canvas width="300" height="300"></canvas>
    <script>
        var canvas = document.querySelector("canvas"),
            c = canvas.getContext("2d");
        c.fillStyle = "hotpink";

        function draw(x, y) {
            if (isDrawing) {
                c.beginPath();
                c.arc(x, y, 10, 0, Math.PI * 2);
                c.closePath();
                c.fill();
            }
        }

        canvas.addEventListener("mousemove", (event) =>
            draw(event.offsetX, event.offsetY),
        );
        canvas.addEventListener("mousedown", () => (isDrawing = true));
        canvas.addEventListener("mouseup", () => (isDrawing = false));

        document
            .querySelector("a#adown")
            .addEventListener(
                "click",
                (event) => (event.target.href = canvas.toDataURL()),
            );</script>
</body>

</html>
