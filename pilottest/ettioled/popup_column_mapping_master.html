<!DOCTYPE html>
<html lang="ko">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta http-equiv='Pragma' content='no-cache' />
    <title>폼 컬럼 마스터 상세</title>
    <style>
        body {
            margin: 0;
            font-size: 12px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between
        }

        ul {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        header {
            /* position: sticky; */
            /* top: 0px; */
            /* background: url(/GWImages/Blue/Covi/Common/popup/popup_title_bg.gif) repeat-x; */
            background-color: #253050;
            /* margin-right: 15px; */
            height: 50px;
        }

        header h1 {
            background: url(/GWImages/Blue/Covi/Common/popup/popup_title_blt.gif) no-repeat;
            background-position: 0 50%;
            margin: 0 0 0 10px;
            padding: 0 15px;
            font-size: 20px;
            color: white;
        }

        nav {
            height: 30px;
            border-bottom: 2px solid #e7f3ff;
            background-color: #e7f3ff;
        }

        footer {
            height: 30px;
            background-color: #e7f3ff;
        }

        .flex-sbetween-center {
            justify-content: space-between;
            align-items: center;
            display: flex;
        }

        .flex-center-center {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .side-padding {
            padding: 0 20px;
        }

        .content {
            /* background-color: black; */
            height: calc(100% - 80px);
            display: flex;
            justify-content: center;
        }

        main {
            height: calc(100% - 30px);
        }

        #div-parsing {
            background-color: white;
            width: 30px;
        }

        #div-list,
        #div-textarea {
            width: calc((100% - 30px) / 2);
        }

        .item {
            background-color: white;
            width: calc(100% - 30px);
            height: calc(100% - 30px);
            border-radius: 20px;
            padding: 10px 10px 10px 20px;
        }

        .item strong {
            height: 30px;
            font-size: 18px;
            /* border-bottom: 1px solid gray; */
        }

        .item_detail
        {
            display: block;
            overflow: auto;
            scrollbar-width: thin;
            overflow-y: scroll;
            height: calc(100% - 40px);
            width: calc(100% - 15px);
            border: 1px solid black;

        }

        textarea.item_detail {
            resize: none;
            /* border-top: none; */
        }

        #item_table {
            width: 100%;
            border-spacing: 0;
        }

        #item_table tbody tr:hover {
            background-color: rgba(200, 200, 200, 0.5);
        }

        #item_table button {
            padding: 0px;
            width: 20px;
            height: 15px;
            border: none;
            background: none;
            box-sizing: border-box;
            color: rgba(0, 0, 0, 0.4);
        }

        #item_table button:hover {
            border: 1px solid rgb(#add6ff);
            background-color: #e7f3ff;
            box-sizing: border-box;
            color: black;
        }


        #div-parsing button {
            padding: 0px;
            width: 20px;
            height: 50px;
            /* border: none; */
            /* background: none; */
            box-sizing: border-box;
            color: rgba(0, 0, 0, 0.7);
        }

        table, tr, td {
            border-collapse: collapse;
        }

        #item_table th {
            background-color: #e2e2e2;
        }

        #item_table th, #item_table td  {
            border-bottom: 1px solid rgb(200, 200, 200);
            
            /* table-layout: fixed; */
        }

        td.col-id, td.col-id {
            padding-left: 10px;
        }

    </style>
</head>

<body>
    <main>
        <header class="flex-sbetween-center">
            <h1>폼 컬럼 마스터 상세</h1>
        </header>
        <nav class="flex-sbetween-center side-padding">
            <div id="div-version">
                <strong>버젼관리</strong>
                <select>
                    <option value="3">3 (최신)</option>
                    <option value="2">2</option>
                    <option value="1">1</option>
                </select>
            </div>
            <div id="div-buttons">
                <button onclick="setsample()">샘플 데이터 넣기</button>
                <button onclick="alert('기능 미구현');">저장</button>
                <button onclick="alert('기능 미구현');">취소</button>
            </div>
        </nav>
        <section class="content">
            <div id="div-list" class="flex-center-center">
                <div class="item">
                    <strong class="flex-sbetween-center" style="display: inline;">폼 컬럼 리스트</strong>
                    <button style="height: 20px; box-sizing: border-box; font-size: 12px; float: right; margin-right: 20px;" onclick="alert('미구현');">행추가</button>
                    <div class="item_detail">
                        <table id="item_table">
                            <colgroup>
                                <col style="width: auto;">
                                <col style="width: auto;">
                                <col style="width: 62px">
                            </colgroup>
                            <thead>
                                <tr>
                                    <th>컬럼ID</th>
                                    <th>컬럼명</th>
                                    <th>옵션</th>
                                </tr>
                            </thead>
                        </table>
                    </div>
                </div>
            </div>
            <div id="div-parsing" class="flex-center-center">
                <ul>
                    <li>
                        <button onclick="parsingXml2Table();">◀</button>
                    </li>
                    <li>
                        <button onclick="parsingTable2Xml();">▶</button>
                    </li>
                </ul>
            </div>
            <div id="div-textarea" class="flex-center-center">
                <div class="item">
                    <strong class="flex-sbetween-center">폼 컬럼 리스트 XML</strong>
                    <textarea id="item_xml" class="item_detail"></textarea>
                </div>
            </div>
        </section>
    </main>
    <footer class="flex-sbetween-center side-padding">
        <button onclick="alert('기능 미구현');">엑셀 불러오기</button>
        <span>&nbsp;</span>
    </footer>
    <script>
        const class_name_colid = "col-id";
        const class_name_colnm = "col-name";
        const class_name_colopt = "col-option";
        const xml_root_nodename = "column_mapping";
        const text_minus = "-";
        const text_up = "▲";
        const text_down = "▼";

        function parsingTable2Xml() {

            // 유효성 검사 필요

            const item_table = document.querySelector("#item_table");
            const item_tr = item_table.querySelectorAll("tbody tr");

            var xml = "";
            xml += "<" + xml_root_nodename + ">";
            for (let i = 0; i < item_tr.length; i++) {
                const this_col_id = item_tr[i].querySelector("td." + class_name_colid).innerText;
                const this_col_name = item_tr[i].querySelector("td." + class_name_colnm).innerText;
                xml += "<" + this_col_id + ">" + this_col_name + "</" + this_col_id + ">";
            }
            xml += "</" + xml_root_nodename + ">";

            item_xml.value = xml;
        }

        function parsingXml2Table() {

            // 유효성 검사 필요

            const xmlString = item_xml.value;

            const parser = new DOMParser();
            const doc = parser.parseFromString(xmlString, "text/xml");

            const new_tbody = document.createElement("tbody");
            for (let i = 0; i < doc.childNodes[0].childNodes.length; i++) {

                const node = doc.childNodes[0].childNodes[i];
                const new_tr = document.createElement("tr");
                new_tr.setAttribute("idx",i);

                const new_td_col_id = document.createElement("td");
                new_td_col_id.classList.add(class_name_colid);
                new_td_col_id.innerHTML = node.nodeName;
                new_tr.appendChild(new_td_col_id);

                const new_td_col_name = document.createElement("td");
                new_td_col_name.classList.add(class_name_colnm);
                new_td_col_name.innerHTML = node.innerHTML;
                new_tr.appendChild(new_td_col_name);

                const new_td_col_option = document.createElement("td");
                new_td_col_name.classList.add(class_name_colopt);
                // <button>-</button><button>▲</button><button>▼</button>
                const new_btn_1 = document.createElement("button");
                new_btn_1.innerText = text_minus;
                new_btn_1.addEventListener("click", function(e) { col_opt_click(e.currentTarget); });
                const new_btn_2 = document.createElement("button");
                new_btn_2.innerText = text_up;
                new_btn_2.addEventListener("click", function(e) { col_opt_click(e.currentTarget); });
                const new_btn_3 = document.createElement("button");
                new_btn_3.innerText = text_down;
                new_btn_3.addEventListener("click", function(e) { col_opt_click(e.currentTarget); });

                new_td_col_option.appendChild(new_btn_1);
                new_td_col_option.appendChild(new_btn_2);
                new_td_col_option.appendChild(new_btn_3);

                new_tr.appendChild(new_td_col_option);

                new_tbody.appendChild(new_tr);
            }

            const item_table = document.querySelector("#item_table");
            const item_tbody = item_table.querySelector("tbody");

            if (item_tbody != null) item_table.removeChild(item_tbody);
            item_table.appendChild(new_tbody);
        }

        function col_opt_click(ctrl)
        {
            const current_tr = ctrl.parentElement.parentElement;
            const current_tbody = current_tr.parentElement;

            if (ctrl.innerText == text_minus)
            {
                const current_tbody = current_tr.parentElement;
                current_tbody.removeChild(current_tr);
            }
            else if (ctrl.innerText == text_up)
            {
                current_tbody.insertBefore(current_tr, current_tr.previousSibling);
            }
            if (ctrl.innerText == text_down)
            {
                current_tbody.insertBefore(current_tr.nextSibling, current_tr);
            }

        }
