        nav {

        footer {

        .item strong {

        .item_detail {
            display: block;

        }

        textarea.item_detail {
            resize: none;
            /* border-top: none; */
        }

        #item_table {
            width: 100%;
            border-spacing: 0;
        }

        #item_table tbody tr:hover {
            background-color: rgba(200, 200, 200, 0.5);
        }

        #item_table button {
            padding: 0px;
            width: 20px;
            height: 15px;
            border: none;
            background: none;
            box-sizing: border-box;
            color: rgba(0, 0, 0, 0.4);
        }

        #item_table button:hover {
            border: 1px solid rgb(#add6ff);
            background-color: #e7f3ff;
            box-sizing: border-box;
            color: black;
        }


        #div-parsing button {
            padding: 0px;
            width: 20px;
            height: 50px;
            /* border: none; */
            /* background: none; */
            box-sizing: border-box;
            color: rgba(0, 0, 0, 0.7);
        }

        table,
        tr,
        td {
            border-collapse: collapse;
        }

        #item_table th {
            background-color: #e2e2e2;
            text-align: left;
            padding-left: 10px;
        }

        #item_table th,
        #item_table td {
            border-bottom: 1px solid rgb(200, 200, 200);
            height: 24px;
            box-sizing: border-box;
            /* table-layout: fixed; */
        }

        #item_table td input[type='text'] {
            /* width: calc(50% - 10px); */
            width: calc(100% - 10px);
        }

        #item_table .th1,
        #item_table .th2 {
            width: calc(50% - 31px);
        }

        #item_table .td_infos {
            width: calc(50% - 31px);
        }

        #item_table .th3 {
            width: 62px;
        }

        td.col-id,
        td.col-id {
            padding-left: 10px;
        }

        .col {
            display: inline-flex;
        }
    </style>
</head>

<body>
    <div style="display:none;">
        <form name="form1" method="post" action="popup_column_mapping_master.aspx?fid=ff9dea0f-9a31-4868-9f86-edf8253efaca" id="form1">
            <input type="submit" name="btnSave" value="" id="btnSave">
            <input type="hidden" id="hdnOrigin_0" revision="0" value="<column_mapping><name>이름</name><employee_no>사원번호</employee_no><division>부서</division><classification>직급</classification><enter_date>입사일</enter_date><birth_date>생일</birth_date><request_date>요청일</request_date><amount>금액</amount></column_mapping>">

        </form>
    </div>
    <main>
        <header class="flex-sbetween-center">
            <h1>폼 컬럼 마스터 상세 - <span id="form-name">
                    경조금 신청
                </span></h1>
        </header>
        <nav class="flex-sbetween-center side-padding">
            <div id="div-version">
                <strong>버젼관리</strong>
                <select id="sct-version" pre-revision="0">
                    <option value="0">0 (최신)</option>

                </select>
            </div>
            <div id="div-buttons">
                <button id="save-form">저장</button>
                <button id="cancel-form">취소</button>
            </div>
        </nav>
        <section class="content">
            <div id="div-list" class="flex-center-center">
                <div class="item">
                    <strong class="flex-sbetween-center" style="display: inline;">폼 컬럼 리스트</strong>
                    <button id="add-row" style="height: 20px; box-sizing: border-box; font-size: 12px; float: right; margin-right: 20px;">행추가</button>
                    <div class="item_detail">
                        <table id="item_table">
                            <thead>
                                <tr>
                                    <th class="th1">컬럼ID</th>
                                    <th class="th2">컬럼명</th>
                                    <th class="th3">옵션</th>
                                </tr>
                            </thead>
                        <tbody><tr><td class="col-id td_infos"><span>name</span></td><td class="col-name td_infos"><span>이름</span></td><td class="col-option"><button>-</button><button>▲</button><button>▼</button></td></tr><tr><td class="col-id td_infos"><span>employee_no</span></td><td class="col-name td_infos"><span>사원번호</span></td><td class="col-option"><button>-</button><button>▲</button><button>▼</button></td></tr><tr><td class="col-id td_infos"><span>division</span></td><td class="col-name td_infos"><span>부서</span></td><td class="col-option"><button>-</button><button>▲</button><button>▼</button></td></tr><tr><td class="col-id td_infos"><span>classification</span></td><td class="col-name td_infos"><span>직급</span></td><td class="col-option"><button>-</button><button>▲</button><button>▼</button></td></tr><tr><td class="col-id td_infos"><span>enter_date</span></td><td class="col-name td_infos"><span>입사일</span></td><td class="col-option"><button>-</button><button>▲</button><button>▼</button></td></tr><tr><td class="col-id td_infos"><span>birth_date</span></td><td class="col-name td_infos"><span>생일</span></td><td class="col-option"><button>-</button><button>▲</button><button>▼</button></td></tr><tr><td class="col-id td_infos"><span>request_date</span></td><td class="col-name td_infos"><span>요청일</span></td><td class="col-option"><button>-</button><button>▲</button><button>▼</button></td></tr><tr><td class="col-id td_infos"><span>amount</span></td><td class="col-name td_infos"><span>금액</span></td><td class="col-option"><button>-</button><button>▲</button><button>▼</button></td></tr></tbody></table>
                    </div>
                </div>
            </div>
            <div id="div-parsing" class="flex-center-center">
                <ul>
                    <li>
                        <button id="parse-2-grid">◀</button>
                    </li>
                    <li>
                        <button id="parse-2-xml">▶</button>
                    </li>
                </ul>
            </div>
            <div id="div-textarea" class="flex-center-center">
                <div class="item">
                    <strong class="flex-sbetween-center">폼 컬럼 리스트 XML</strong>
                    <textarea id="item_xml" class="item_detail"></textarea>
                </div>
            </div>
        </section>
    </main>
    <footer class="flex-sbetween-center side-padding">
        <span>
            <button id="import-excel">엑셀 불러오기</button>
            <button id="down-excel-sample">엑셀 업로드 샘플</button>
        </span>
        <div style="display: none;">
            <input type="file" id="excel-file" onchange="inportExcel(event)">
        </div>
        <span>&nbsp;</span>
    </footer>
    <script src="assets/xlsx.full.min.js"></script>
    <script src="assets/FileSaver.min.js"></script>
    <script>

        const class_name_colid = "col-id";
        const class_name_colnm = "col-name";
        const class_name_colopt = "col-option";
        const xml_root_nodename = "column_mapping";
        const text_minus = "-";
        const text_up = "▲";
        const text_down = "▼";
        const sct_v = document.getElementById("sct-version");
        const form = document.getElementById("form1");
        const const_prefix_hdn_new = "hdnNew_";
        const const_prefix_hdn_ori = "hdnOrigin_";
        const const_ctrl_edited_list = "hdn_e_l"

        function parseGrid2Xml() {

            // 유효성 검사 필요

            const item_table = document.getElementById("item_table");
            const item_tr = item_table.querySelectorAll("tbody tr");

            var invaildCtrl = null;

            var xml = "";
            xml += "<" + xml_root_nodename + ">";
            for (let i = 0; i < item_tr.length; i++) {
                const this_col_id_td = item_tr[i].querySelector("td." + class_name_colid);
                const this_col_name_td = item_tr[i].querySelector("td." + class_name_colnm);

                const this_col_id_value = this_col_id_td.innerText.trim();
                const this_col_name_value = this_col_name_td.innerText.trim();

                if (this_col_id_value == "" || this_col_name_value == "") continue;

                xml += "<" + this_col_id_value + ">" + this_col_name_value + "</" + this_col_id_value + ">";
            }

            xml += "</" + xml_root_nodename + ">";

            item_xml.value = xml;
        }

        function parseXml2Grid(isFirst) {

            // 유효성 검사 필요
            const xmlString = item_xml.value;

            const parser = new DOMParser();
            const doc = parser.parseFromString(xmlString, "text/xml");
            
            if (xIsEmpty(isFirst)) isFirst = false;

            if (!isFirst && 0 < doc.childNodes[0].querySelectorAll("parsererror").length) {
                alert("비정상적인 XML 형식입니다.");
                item_xml.focus();
                return;
            }

            const target_tbody = document.createElement("tbody");

            for (let i = 0; i < doc.childNodes[0].childNodes.length; i++) {

                const node = doc.childNodes[0].childNodes[i];
                addGridRow(target_tbody, node.nodeName, node.innerHTML);
            }

            const item_table = document.getElementById("item_table");
            const item_tbody = item_table.querySelector("tbody");

            if (item_tbody != null) item_table.removeChild(item_tbody);
            item_table.appendChild(target_tbody);
        }

        function addGridRow(target_tbody, node_id, node_name) {

            const new_tr = document.createElement("tr");

            const td_infos = [[class_name_colid, node_id], [class_name_colnm, node_name]];
            td_infos.forEach(td_info => {
                const new_td = document.createElement("td");
                new_td.classList.add(td_info[0]);
                new_td.classList.add("td_infos");
                const new_span = document.createElement("span");
                new_span.innerText = td_info[1];
                new_td.appendChild(new_span);
                new_td.addEventListener("click", function (e) {

                    const current_td = e.currentTarget;
                    if (0 < current_td.querySelectorAll("input[type='text']").length) return;
                    const span = current_td.querySelector("span");
                    const new_text = document.createElement("input");
                    new_text.setAttribute("type", "text");
                    new_text.setAttribute("value", span.innerText);
                    current_td.appendChild(new_text);
                    new_text.focus();
                    span.style.display = "none";

                    const events = ["focusout", "keyup"];
                    events.forEach(evt => {
                        new_text.addEventListener(evt, function (e) {

                            if (e.type == "keyup" && !(e.keyCode == 13 || e.keyCode == 27)) return;

                            const current_td = e.currentTarget.parentElement;
                            const span = current_td.querySelector("span");
                            const text = current_td.querySelector("input[type='text']");
                            var new_text = text.value;
                            var old_text = span.innerText;

                            var is_okey = false;
                            if (0 < new_text.length && new_text != old_text) {
                                if (e.type == "keyup" && (e.key == "Enter" || e.keyCode == 13)) {
                                    is_okey = true;
                                }
                                else if (e.type == "focusout") {
                                    is_okey = true;
                                }
                            }
                            if (is_okey) {
                                span.innerText = text.value;
                            }

                            if (!xIsEmpty(text)) current_td.removeChild(text);
                            span.style.display = "";
                        });

                    });

                });
                new_tr.appendChild(new_td);
            });

            // td opt 생성
            const new_td_col_option = document.createElement("td");
            new_td_col_option.classList.add(class_name_colopt);

            const OptButtons = [text_minus, text_up, text_down];
            OptButtons.forEach(OptButton => {
                const new_btn = document.createElement("button");
                new_btn.innerText = OptButton;
                new_btn.addEventListener("click", function (e) {
                    //col_opt_click(e.currentTarget); 
                    const ctrl = e.currentTarget;
                    const current_tr = ctrl.parentElement.parentElement;
                    const current_tbody = current_tr.parentElement;

                    if (ctrl.innerText == text_minus) {
                        const current_tbody = current_tr.parentElement;
                        current_tbody.removeChild(current_tr);
                    }
                    else if (ctrl.innerText == text_up) {
                        current_tbody.insertBefore(current_tr, current_tr.previousSibling);
                    }
                    if (ctrl.innerText == text_down) {
                        current_tbody.insertBefore(current_tr.nextSibling, current_tr);
                    }
                });
                new_td_col_option.appendChild(new_btn);
            });

            new_tr.appendChild(new_td_col_option);
            target_tbody.appendChild(new_tr);
        }

        function inportExcel(e) {

            var input = e.target;
            var reader = new FileReader();
            reader.onload = function () {
                var fileData = reader.result;
                var wb = XLSX.read(fileData, { type: 'binary' });
                wb.SheetNames.forEach(function (sheetName) {
                    var rowObj = XLSX.utils.sheet_to_json(wb.Sheets[sheetName]);

                    var target_tbody = document.createElement("tbody");
                    for (let i = 0; i < rowObj.length; i++) {
                        addGridRow(target_tbody, rowObj[i].COLUMN_ID, rowObj[i].COLUMN_NAME);
                    }
                    const item_table = document.querySelector("#item_table");
                    item_table.appendChild(target_tbody);

                    const item_tbody = item_table.querySelector("tbody");
                    if (item_tbody != null) item_table.removeChild(item_tbody);
                    item_table.appendChild(target_tbody);

                });

                parseGrid2Xml();
            };
            reader.readAsBinaryString(input.files[0]);

            input.value = "";
        }

        function downExcelSample() {
            // step 1. workbook 생성
            var wb = XLSX.utils.book_new();

            // step 2. 시트 만들기 
            var newWorksheet = excelHandler.getWorksheet();

            // step 3. workbook에 새로만든 워크시트에 이름을 주고 붙인다.  
            XLSX.utils.book_append_sheet(wb, newWorksheet, excelHandler.getSheetName());

            // step 4. 엑셀 파일 만들기 
            var wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'binary' });

            // step 5. 엑셀 파일 내보내기 
            saveAs(new Blob([s2ab(wbout)], { type: "application/octet-stream" }), excelHandler.getExcelFileName());
        }
        var excelHandler = {
            getExcelFileName: function () {
                return 'upload_sample.xlsx';
            },
            getSheetName: function () {
                return 'Sheet1';
            },
            getExcelData: function () {
                return [['COLUMN_ID', 'COLUMN_NAME'], ['FOOD_1', '계란후라이'], ['FOOD_2', '초밥'], ['FOOD_3', '햄버거']];
            },
            getWorksheet: function () {
                return XLSX.utils.aoa_to_sheet(this.getExcelData());
            }
        }
        function s2ab(s) {
            var buf = new ArrayBuffer(s.length); //convert s to arrayBuffer
            var view = new Uint8Array(buf);  //create uint8array as viewer
            for (var i = 0; i < s.length; i++) view[i] = s.charCodeAt(i) & 0xFF; //convert to octet
            return buf;
        }

        function setDefault(revision) {

            const sct = sct_v;
            sct.setAttribute("pre-revision", revision);
            const origin = document.querySelector("#" + const_prefix_hdn_ori + revision);
            if (origin == null) {
                // alert("등록된 컬럼이 없습니다. 처음부터 등록해주세요.");
            }
            else {
                item_xml.value = origin.value;
                parseXml2Grid(true);
            }
        }

        function packXml2Form(sct) {

            const attr_nm = "pre-revision";
            const pre_revision = sct.getAttribute(attr_nm);
            const now_revision = sct[sct.selectedIndex].value;

            // item_xml.value

            let hdnNew = form.querySelector("input[name=\"" + const_prefix_hdn_new + pre_revision + "\"]");
            if (hdnNew == null) {
                hdnNew = document.createElement("input");
                hdnNew.setAttribute("type", "hidden");
                hdnNew.setAttribute("name", const_prefix_hdn_new + pre_revision);
                hdnNew.setAttribute("revision", pre_revision);
                form.appendChild(hdnNew);
            }

            const hdnOrigin = document.querySelector("#form1 input[name=\"" + const_prefix_hdn_ori + pre_revision + "\"]");
            if (hdnOrigin != null) {
                if (hdnOrigin.value != item_xml.value) hdnNew.value = item_xml.value;
            }
            else {
                hdnNew.value = item_xml.value;
            }

            sct.setAttribute(attr_nm, now_revision);
        }

        //------------------------------------------------------------
        // 이벤트
        //------------------------------------------------------------

        function xIsEmpty(p) {
            if (typeof p === "undefined" || p == null) {
                return true;
            }
            else if (p.toString() === "") {
                return true;
            }
            return false;
        }

        document.addEventListener("DOMContentLoaded", () => {

            sct_v.addEventListener("change", (e) => {
                packXml2Form(e.target);
            });

            document.getElementById("parse-2-grid").addEventListener("click", (e) => {
                parseXml2Grid();
            });

            document.getElementById("parse-2-xml").addEventListener("click", (e) => {
                parseGrid2Xml();
            });

            document.getElementById("import-excel").addEventListener("click", (e) => {
                document.getElementById("excel-file").click();
            });


            document.getElementById("down-excel-sample").addEventListener("click", (e) => {
                downExcelSample();
            });

            //down-excel-sample
            //downExcelSample

            document.getElementById("save-form").addEventListener("click", (e) => {

                const xmlString = item_xml.value;
                const parser = new DOMParser();
                const doc = parser.parseFromString(xmlString, "text/xml");

                if (xmlString.trim().length == 0) {
                    alert("값이 없습니다.");
                    item_xml.focus();
                    return;
                }
                else if (0 < doc.childNodes[0].querySelectorAll("parsererror").length) {
                    alert("비정상적인 XML 형식입니다.");
                    item_xml.focus();
                    return;
                }


                if (!confirm("저장하시겠습니까?\r\n저장은 XML 기준으로 진행됩니다.")) return;


                
                // 지금 화면 저장
                packXml2Form(sct_v);

                let invaildCount = 0;

                let origin_list = form.querySelectorAll("[name^=" + const_prefix_hdn_ori + "]");
                let new_list = form.querySelectorAll("[name^=" + const_prefix_hdn_new + "]");

                const hdn_save_list = document.createElement("input");
                hdn_save_list.setAttribute("type", "hidden");
                hdn_save_list.setAttribute("name", const_ctrl_edited_list);
                form.appendChild(hdn_save_list);

                new_list.forEach(element => {
                    element.value = element.value.replaceAll("<", "&lt;").replaceAll(">", "&gt;");
                    const revision = element.getAttribute("revision");

                    if (0 < origin_list.length)
                    {
                        const originValue = origin_list.querySelector("[revision=" + revision + "]").value;
                        if (element.value != originValue) {
                            hdn_save_list.value += revision + ",";
                        }
                    }
                    else
                    {
                        hdn_save_list.value += revision + ",";
                    }
                });


                origin_list.forEach(element => {
                    form.removeChild(element);
                });

                document.querySelector("#btnSave").click();
            });

            document.getElementById("add-row").addEventListener("click", (e) => {

                var has_tbody = true;
                const item_table = document.querySelector("#item_table");
                var target_tbody = item_table.querySelector("tbody");
                if (xIsEmpty(target_tbody)) {
                    has_tbody = false;
                    target_tbody = document.createElement("tbody");
                }

                addGridRow(target_tbody, "", "");

                if (!has_tbody) {
                    item_table.appendChild(target_tbody);
                }

                const tr = target_tbody.querySelectorAll("tr");
                tr[tr.length - 1].querySelector("td").click();

            });


        setDefault("0");

    });

    </script>


</body></html>
